<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 圆角矩形背景 -->
  <rect width="512" height="512" rx="96" fill="url(#grad)"/>
  <!-- AI脑/优先级排序的抽象图形 -->
  <!-- 三条递减的横条代表优先级排序 -->
  <rect x="96" y="128" width="320" height="56" rx="28" fill="white" opacity="0.95"/>
  <rect x="96" y="228" width="240" height="56" rx="28" fill="white" opacity="0.75"/>
  <rect x="96" y="328" width="160" height="56" rx="28" fill="white" opacity="0.55"/>
  <!-- 右上角AI星标 -->
  <circle cx="400" cy="112" r="36" fill="#fbbf24"/>
  <text x="400" y="124" text-anchor="middle" fill="#6366f1" font-size="40" font-weight="bold" font-family="Arial">AI</text>
</svg>
